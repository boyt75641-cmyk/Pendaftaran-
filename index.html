<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>X FEST 2026</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      background:linear-gradient(to bottom,#8fe3ff,#ffffff);
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;
    }

    .container{
      width:100%;
      max-width:450px;
      background:#fff;
      border-radius:25px;
      overflow:hidden;
      box-shadow:0 10px 30px rgba(0,0,0,0.2);
      animation:fadeIn 1s ease;
    }

    @keyframes fadeIn{
      from{
        opacity:0;
        transform:translateY(20px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    /* BANNER */

    .banner{
      width:100%;
      height:260px;
      overflow:hidden;
      position:relative;
    }

    .banner img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .banner::after{
      content:'X FEST 2026';
      position:absolute;
      bottom:20px;
      left:20px;
      color:white;
      font-size:32px;
      font-weight:bold;
      text-shadow:0 5px 10px rgba(0,0,0,0.4);
    }

    /* FORM */

    .form-box{
      padding:25px;
    }

    .title{
      text-align:center;
      font-size:28px;
      font-weight:bold;
      color:#ff0099;
      margin-bottom:25px;
    }

    .input-group{
      margin-bottom:18px;
    }

    .input-group label{
      display:block;
      margin-bottom:8px;
      font-weight:bold;
      color:#333;
    }

    .input-group input,
    .input-group select,
    .input-group textarea{
      width:100%;
      padding:14px;
      border-radius:14px;
      border:2px solid #ddd;
      outline:none;
      font-size:15px;
      transition:0.3s;
      background:#fff;
    }

    .input-group input:focus,
    .input-group select:focus,
    .input-group textarea:focus{
      border-color:#ff00aa;
      box-shadow:0 0 10px rgba(255,0,170,0.3);
    }

    textarea{
      resize:none;
    }

    /* TIKET */

    .ticket-box{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:15px;
      margin-top:10px;
    }

    .ticket{
      background:linear-gradient(135deg,#ff00aa,#ff5fd2);
      border-radius:18px;
      color:white;
      cursor:pointer;
      transition:0.3s;
      overflow:hidden;
      position:relative;
    }

    .ticket:hover{
      transform:scale(1.03);
    }

    .ticket input{
      display:none;
    }

    .ticket-content{
      padding:15px;
      text-align:center;
      border:3px solid transparent;
      border-radius:18px;
      transition:0.3s;
    }

    .ticket input:checked + .ticket-content{
      border:3px solid yellow;
      background:rgba(255,255,255,0.1);
    }

    .ticket h3{
      font-size:22px;
      margin-bottom:10px;
    }

    .ticket p{
      font-size:14px;
      line-height:1.7;
    }

    .price{
      margin-top:10px;
      display:block;
      font-weight:bold;
      color:yellow;
    }

    /* QRIS */

    .qris-box{
      width:100%;
      text-align:center;
      margin-top:10px;
    }

    .qris-box img{
      width:220px;
      max-width:100%;
      border-radius:15px;
      border:3px solid #ff00aa;
      padding:10px;
      background:white;
      transition:0.3s;
    }

    .qris-box img:hover{
      transform:scale(1.03);
    }

    /* BUTTON */

    .btn{
      width:100%;
      padding:16px;
      border:none;
      border-radius:15px;
      background:linear-gradient(90deg,#ff0099,#ff4fc3);
      color:white;
      font-size:18px;
      font-weight:bold;
      cursor:pointer;
      transition:0.3s;
      margin-top:10px;
      position:relative;
      overflow:hidden;
    }

    .btn:hover{
      transform:translateY(-2px);
      box-shadow:0 8px 20px rgba(255,0,170,0.4);
    }

    .btn:active{
      transform:scale(0.98);
    }

    /* FOOTER */

    .footer{
      text-align:center;
      padding:15px;
      font-size:13px;
      color:#666;
      background:#f7f7f7;
    }

    /* SUCCESS PAGE */

    .success-page{
      display:none;
      padding:40px 25px;
      text-align:center;
      animation:fadeIn 0.8s ease;
    }

    .check{
      width:100px;
      height:100px;
      margin:auto;
      border-radius:50%;
      background:linear-gradient(135deg,#00d26a,#00a651);
      display:flex;
      align-items:center;
      justify-content:center;
      color:white;
      font-size:50px;
      font-weight:bold;
      box-shadow:0 10px 25px rgba(0,210,106,0.4);
      animation:pop 0.5s ease;
    }

    @keyframes pop{
      0%{
        transform:scale(0);
      }
      100%{
        transform:scale(1);
      }
    }

    .success-title{
      font-size:30px;
      color:#00a651;
      font-weight:bold;
      margin-top:25px;
    }

    .success-text{
      margin-top:15px;
      color:#555;
      line-height:1.7;
      font-size:15px;
    }

    .success-btn{
      display:inline-block;
      margin-top:25px;
      padding:14px 25px;
      border-radius:15px;
      text-decoration:none;
      background:linear-gradient(90deg,#ff0099,#ff4fc3);
      color:white;
      font-weight:bold;
      transition:0.3s;
    }

    .success-btn:hover{
      transform:translateY(-2px);
      box-shadow:0 8px 20px rgba(255,0,170,0.4);
    }

    @media(max-width:500px){

      .ticket-box{
        grid-template-columns:1fr;
      }

      .banner{
        height:220px;
      }

    }

  </style>
</head>

<body>

  <div class="container">

    <!-- FORM PAGE -->

    <div id="formPage">

      <!-- BANNER -->

      <div class="banner">
        <img src="banner.png" alt="Banner X FEST">
      </div>

      <!-- FORM -->

      <div class="form-box">

        <div class="title">
          FORM PENDAFTARAN
        </div>

        <form id="registerForm">

          <!-- NAMA -->

          <div class="input-group">
            <label>Nama Lengkap</label>
            <input type="text" placeholder="Masukkan nama lengkap" required>
          </div>

          <!-- EMAIL -->

          <div class="input-group">
            <label>Email</label>
            <input type="email" placeholder="Masukkan email aktif" required>
          </div>

          <!-- WHATSAPP -->

          <div class="input-group">
            <label>Nomor WhatsApp</label>
            <input type="tel" placeholder="08xxxxxxxxxx" required>
          </div>

          <!-- ALAMAT -->

          <div class="input-group">
            <label>Alamat Lengkap</label>
            <textarea rows="4" placeholder="Masukkan alamat lengkap"></textarea>
          </div>

          <!-- PILIH TIKET -->

          <div class="input-group">

            <label>Pilih Tiket</label>

            <div class="ticket-box">

              <!-- VIP -->

              <label class="ticket">

                <input type="radio" name="tiket" required>

                <div class="ticket-content">

                  <h3>VIP</h3>

                  <p>
                    Sendiri : 159K<br>
                    Berdua : 279K<br>
                    Berempat : 519K
                  </p>

                  <span class="price">
                    BEST SELLER
                  </span>

                </div>

              </label>

              <!-- REGULER -->

              <label class="ticket">

                <input type="radio" name="tiket">

                <div class="ticket-content">

                  <h3>REGULER</h3>

                  <p>
                    Sendiri : 99K<br>
                    Berdua : 189K<br>
                    Berempat : 359K
                  </p>

                  <span class="price">
                    HEMAT
                  </span>

                </div>

              </label>

            </div>

          </div>

          <!-- JUMLAH -->

          <div class="input-group">

            <label>Jumlah Tiket</label>

            <select required>
              <option value="">-- Pilih Jumlah --</option>
              <option>1 Orang</option>
              <option>2 Orang</option>
              <option>4 Orang</option>
            </select>

          </div>

          <!-- PEMBAYARAN -->

          <div class="input-group">

            <label>Metode Pembayaran</label>

            <select required>
              <option value="">-- Pilih Pembayaran --</option>
              <option>DANA</option>
              <option>OVO</option>
              <option>GOPAY</option>
              <option>QRIS</option>
              <option>Transfer Bank</option>
            </select>

          </div>

          <!-- QRIS -->

          <div class="input-group">

            <label>QRIS Pembayaran</label>

            <div class="qris-box">
              <img src="qris.png" alt="QRIS Payment">
            </div>

          </div>

          <!-- UPLOAD -->

          <div class="input-group">

            <label>Upload Bukti Pembayaran</label>

            <input type="file" accept="image/*" required>

          </div>

          <!-- BUTTON -->

          <button type="submit" class="btn">
            DAFTAR SEKARANG
          </button>

        </form>

      </div>

    </div>

    <!-- SUCCESS PAGE -->

    <div class="success-page" id="successPage">

      <div class="check">
        ✓
      </div>

      <div class="success-title">
        PEMBAYARAN BERHASIL
      </div>

      <div class="success-text">
        Terima kasih telah melakukan pendaftaran X FEST 2026.<br><br>
        Data dan bukti pembayaran kamu sudah berhasil dikirim.<br>
        Tiket akan segera diproses oleh panitia.
      </div>

      <a href="" class="success-btn">
        KEMBALI KE FORM
      </a>

    </div>

    <!-- FOOTER -->

    <div class="footer">
      © 2026 X FEST INDONESIA - ALL RIGHTS RESERVED
    </div>

  </div>

  <script>

    const form = document.getElementById('registerForm');

    form.addEventListener('submit', function(e){

      e.preventDefault();

      // sembunyikan form
      document.getElementById('formPage').style.display = 'none';

      // tampilkan halaman sukses
      document.getElementById('successPage').style.display = 'block';

      // scroll ke atas
      window.scrollTo({
        top:0,
        behavior:'smooth'
      });

    });

  </script>

</body>
</html>
